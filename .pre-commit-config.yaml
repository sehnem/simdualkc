repos:
  # Ruff: linting (with auto-fix) + formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ty: type checking (local hook — runs via uv)
  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        language: system
        entry: uv run ty check src/
        pass_filenames: false
        types: [python]
