site_name: simdualkc-core
site_description: Mathematical core for the SIMDualKc dual crop coefficient water balance model (FAO-56)
site_url: https://simdualkc.readthedocs.io
repo_url: https://github.com/simdualkc/simdualkc-core
repo_name: simdualkc/simdualkc-core

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Theory:
    - Model Overview: theory/overview.md
    - Basal Crop Coefficient (Kcb): theory/kcb.md
    - Soil Evaporation (Ke): theory/evaporation.md
    - Water Balance & Stress: theory/water-balance.md
    - Auxiliary Fluxes: theory/auxiliary.md
    - ETo (Penman-Monteith): theory/eto.md
    - Yield Model: theory/yield.md
  - API Reference:
    - Simulation: api/simulation.md
    - Models: api/models.md
    - Kcb Module: api/kcb.md
    - Evaporation: api/evaporation.md
    - Water Balance: api/water-balance.md
    - Auxiliary: api/auxiliary.md
    - ETo Calculator: api/eto.md
    - Irrigation: api/irrigation.md
    - Yield Model: api/yield-model.md
    - Reporting: api/reporting.md
    - Data Loader: api/data-loader.md
  - Guides:
    - Quick Start: guides/quickstart.md
    - Multi-layer Soil: guides/multilayer-soil.md
    - ETo from Weather: guides/eto-from-weather.md
    - Automated Irrigation: guides/automated-irrigation.md
    - Groundcover & Orchards: guides/groundcover.md
    - Salinity & Yield: guides/salinity-yield.md
  - References: references.md

plugins:
  - search

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
